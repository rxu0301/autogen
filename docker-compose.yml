# docker-compose.yml
#
# 뉴스 숏폼 에이전트 서비스
#
# 필수 환경 변수 (.env 파일에 설정):
#   NAVER_CLIENT_ID      — 네이버 뉴스 API 클라이언트 ID (권장)
#   NAVER_CLIENT_SECRET  — 네이버 뉴스 API 클라이언트 시크릿 (권장)
#   NEWSAPI_KEY          — NewsAPI.org API 키 (선택)
#
# 사용법:
#   cp backend/.env.example backend/.env  # 환경변수 설정
#   docker compose up -d

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:4000
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  bff:
    build: ./bff
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - BACKEND_URL=http://backend:8000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_BFF_URL=http://localhost:4000/api
    depends_on:
      - bff
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
