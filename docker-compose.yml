# docker-compose.yml
#
# 필수 환경 변수:
#   PINECONE_API_KEY  — Pinecone 클라우드 벡터 DB API 키 (없으면 ChromaDB 전용으로 동작)
#
# 사용법:
#   echo "PINECONE_API_KEY=your-key" > .env
#   docker compose up -d

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-shortform-content}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000   # 컨테이너 내부 포트 (호스트 매핑 8001:8000과 무관)
      - CORS_ORIGINS=http://localhost:3000,http://localhost:4000
    depends_on:
      - ollama
      - chromadb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  bff:
    build: ./bff
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - BACKEND_URL=http://backend:8000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_BFF_URL을 비워두면 프론트엔드가 상대 경로(/api)로 요청하고
        # nginx가 BFF로 프록시합니다. 외부 BFF URL이 필요한 경우 여기에 지정하세요.
        VITE_BFF_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - bff
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
